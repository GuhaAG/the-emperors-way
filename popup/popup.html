<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Emperor's Way</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>The Emperor's Way</h1>
    
    <label class="toggle-container">
      <input type="checkbox" id="redirectToggle" checked>
      <span class="toggle-label">Redirect Fextralife pages</span>
    </label>
    
    <label class="toggle-container">
      <input type="checkbox" id="filterToggle" checked>
      <span class="toggle-label">Hide Fextralife in search results</span>
    </label>
    
    <input type="text" id="searchBox" placeholder="Search community wiki..." autocomplete="off">
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
